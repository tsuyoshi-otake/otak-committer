name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build + Lint + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run compile

      - name: Lint (no warnings)
        run: npm run lint:ci

      - name: Unit tests
        run: npm run test:unit

  vscode-host-test:
    name: VSCode-host Tests (${{ matrix.os }})
    needs: build-test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache VSCode test binary
        uses: actions/cache@v4
        with:
          path: .vscode-test
          key: ${{ runner.os }}-vscode-test-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-vscode-test-

      - name: Run VSCode-host tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - name: Run VSCode-host tests (Windows)
        if: runner.os == 'Windows'
        run: npm test
